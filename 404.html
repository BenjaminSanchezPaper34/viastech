<!DOCTYPE html>
<html class="no-js" lang="fr" dir="ltr">
<head>
<meta charset="UTF-8" />

<meta name="theme-color" content="#0a0a0a" />

<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/svg+xml" href="/assets/img/brand/favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />

<body>
<a href="#contenu" class="skip-link">Aller au contenu</a>

<header class="nav is-scrolled" data-nav>

      <img class="nav__logo" src="/assets/img/brand/logo-banner-blanc.svg" alt="ViasTech — spécialiste véhicules allemands" width="280" height="67" />

      <div class="error__actions">
        <a href="/" class="btn btn--primary btn--lg">

          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M5 12h12m-5-5 5 5-5 5"/></svg>
        </a>
        <a href="/#vehicules" class="btn btn--ghost btn--lg">
          <span>Voir les occasions</span>
        </a>
        <a href="tel:+33950736322" class="btn btn--ghost btn--lg">
          <span>Nous appeler</span>
        </a>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom">
      <span>© <span data-year>2026</span> ViasTech</span>
      <span class="footer__separator">·</span>
      <a href="/">Accueil</a>
      <span class="footer__separator">·</span>
      <a href="/mentions-legales/">Mentions légales</a>
    </div>
  </div>

<script src="/assets/js/main.js" defer></script>
